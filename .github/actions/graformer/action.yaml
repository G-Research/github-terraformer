name: "Bot action to create automated PRs"
description: "Bot action to create automated PRs"
inputs:
  tfc-token:
    description: "HCP token for authentication"
    required: true
  tfc-organization:
    description: "HCP cloud organization"
    required: true
  tfc-workspace:
    description: "HCP cloud workspace name"
    required: true
  gh-token:
    description: "GitHub token for posting PR comments"
    required: true
  pr-number:
    description: "Pull request number to post comments to"
    required: true
outputs:
  plan-exitcode:
    description: "Plan detailed exit code (0 - success, empty diff; 1 - error; 2 - success, non-empty diff)"
    value: ${{ steps.plan.outputs.exitcode }}
runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        cli_config_credentials_token: ${{ inputs.tfc-token }}

    - name: Terraform fmt
      id: fmt
      shell: bash
      run: terraform fmt -check
      continue-on-error: true

    - name: Run Terraform init
      working-directory: feature/github-repo-provisioning
      id: init
      shell: bash
      run: terraform init -input=false
      env:
        TF_CLOUD_ORGANIZATION: ${{ inputs.tfc-organization }}
        TF_WORKSPACE: ${{ inputs.tfc-workspace }}

    - name: Terraform Validate
      id: validate
      shell: bash
      run: terraform validate -no-color

    - name: Run Terraform plan
      id: plan
      shell: bash
      working-directory: feature/github-repo-provisioning
      env:
        TF_CLOUD_ORGANIZATION: ${{ inputs.tfc-organization }}
        TF_WORKSPACE: ${{ inputs.tfc-workspace }}
#      run: terraform plan -no-color -input=false -detailed-exitcode
      run: terraform plan -no-color -input=false -detailed-exitcode -out=tfplan.binary

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'   # adjust to your preferred Go version

    - name: Post Terraform plan summary to PR
      shell: bash
      env:
        TF_PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        PR_NUMBER: ${{ inputs.pr-number }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        ls -la plan.json
        cat plan.json
        # Save the Go script to a temp file (quick hackathon style)
        cat <<'EOF' > terraform-pr-comment.go
        package main
  
          import (
          "fmt"
          "os"
          "os/exec"
          "regexp"
          "strings"
          )
          
          func main() {
          planOutput := os.Getenv("TF_PLAN_OUTPUT")
          if planOutput == "" {
          fmt.Println("TF_PLAN_OUTPUT not set")
          os.Exit(1)
        }
          
          var toCreate, toDelete, toModify, toImport []string
          
          lines := strings.Split(planOutput, "\n")
          refreshRegex := regexp.MustCompile(`Refreshing state\.\.\.`)
          
          for _, line := range lines {
          trimmed := strings.TrimSpace(line)
          if trimmed == "" || refreshRegex.MatchString(trimmed) {
          continue
        }
          
          switch {
        case strings.HasPrefix(trimmed, "+ "):
          toCreate = append(toCreate, trimmed[2:])
        case strings.HasPrefix(trimmed, "- "):
          toDelete = append(toDelete, trimmed[2:])
        case strings.HasPrefix(trimmed, "~ "):
          toModify = append(toModify, trimmed[2:])
        case strings.HasPrefix(trimmed, "<="):
          toImport = append(toImport, trimmed[2:])
        }
        }
          
          // Build the comment
          commentBuilder := &strings.Builder{}
          writeSection := func(title string, items []string) {
          if len(items) == 0 {
          return
        }
          fmt.Fprintf(commentBuilder, "### %s\n", title)
          for _, item := range items {
          fmt.Fprintf(commentBuilder, "- %s\n", item)
        }
          fmt.Fprintln(commentBuilder)
        }
          
          writeSection("To be created", toCreate)
          writeSection("To be deleted", toDelete)
          writeSection("To be modified", toModify)
          writeSection("To be imported", toImport)
          
          comment := commentBuilder.String()
          if comment == "" {
          comment = "No resources will change."
        }
        
        // DEBUG: print to stdout
          fmt.Println("===== Terraform PR Comment =====")
          fmt.Println(comment)
          fmt.Println("================================")
          
          // Post to PR using gh CLI
          prNumber := os.Getenv("PR_NUMBER")
          if prNumber == "" {
          fmt.Println("PR_NUMBER not set")
          os.Exit(1)
        }
          
          repo := os.Getenv("GITHUB_REPOSITORY")
          if repo == "" {
          fmt.Println("GITHUB_REPOSITORY not set")
          os.Exit(1)
        }
          
          cmd := exec.Command("gh", "pr", "comment", prNumber, "--repo", repo, "--body", comment)
          cmd.Stdout = os.Stdout
          cmd.Stderr = os.Stderr
          
          if err := cmd.Run(); err != nil {
        fmt.Printf("failed to post PR comment: %v\n", err)
          os.Exit(1)
        }
          
          fmt.Println("PR comment posted successfully!")
        }
  
        EOF

        # Run it
        go run terraform-pr-comment.go
    
