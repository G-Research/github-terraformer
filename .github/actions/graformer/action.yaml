name: "Bot action to create automated PRs"
description: "Bot action to create automated PRs"
inputs:
  tfc-token:
    description: "HCP token for authentication"
    required: true
  tfc-organization:
    description: "HCP cloud organization"
    required: true
  tfc-workspace:
    description: "HCP cloud workspace name"
    required: true
outputs:
  plan-exitcode:
    description: "Plan detailed exit code (0 - success, empty diff; 1 - error; 2 - success, non-empty diff)"
    value: ${{ steps.set-outputs.outputs.exitcode }}
  plan-summary:
    description: "Summary of the Terraform plan"
    value: ${{ steps.set-outputs.outputs.plan_summary }}
runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        cli_config_credentials_token: ${{ inputs.tfc-token }}

    - name: Link backend file
      id: link
      shell: bash
      working-directory: feature/github-repo-provisioning
      env:
        BACKEND: ${{ env.BACKEND }}
      run: |
        if [[ -n "${BACKEND}" ]]; then
          ln -sf "backend.tf.${BACKEND}" backend.tf
        else
          ln -sf backend.tf.hcp backend.tf
        fi

    - name: Terraform fmt
      id: fmt
      shell: bash
      run: terraform fmt -check
      continue-on-error: true

    - name: Run Terraform init
      working-directory: feature/github-repo-provisioning
      id: init
      shell: bash
      run: terraform init -input=false
      env:
        TF_CLOUD_ORGANIZATION: ${{ inputs.tfc-organization }}
        TF_WORKSPACE: ${{ inputs.tfc-workspace }}

    - name: Terraform Validate
      id: validate
      shell: bash
      run: terraform validate -no-color

    - name: Run Terraform plan
      id: plan
      shell: bash
      working-directory: feature/github-repo-provisioning
      env:
        TF_CLOUD_ORGANIZATION: ${{ inputs.tfc-organization }}
        TF_WORKSPACE: ${{ inputs.tfc-workspace }}
      run: |
        terraform plan -no-color -input=false -out=tfplan
        terraform show --json tfplan | jq '{resource_changes: [.resource_changes[]]}' > tfplan.json 
        rm tfplan

    - name: Inspect plan result
      uses: actions/github-script@v7
      id: inspect-plan-result
      with:
        script: |
            const fs = require('fs');
    
            const planJson = JSON.parse(fs.readFileSync('feature/github-repo-provisioning/tfplan.json', 'utf8'));
            const changes = {
                create: [],
                update: [],
                delete: [],
                import: [],
                recreate: []
            };
    
            if (planJson.resource_changes) {
                for (const resourceChange of planJson.resource_changes) {
                  const actions = resourceChange.change.actions;
                  
                  if (actions && actions.length === 1) {
                    var action = actions[0];
                    
                    if (action === 'no-op' && resourceChange.change.importing !== null) {
                      changes.import.push(`${resourceChange.address} ${resourceChange.name}`);
                    }else if(action === 'create'){
                        changes.create.push(`${resourceChange.address} ${resourceChange.name}`);
                    }else if(action === 'delete'){
                        changes.delete.push(`${resourceChange.address} ${resourceChange.name}`);
                    }else if(action === 'update'){
                        changes.update.push(`${resourceChange.address} ${resourceChange.name}`);
                    }
          
                  } else if (actions && actions.length > 1) {
                    changes.recreate.push(`${resourceChange.address} ${resourceChange.name}`);
                  }
                }
            }
    
            return changes;

    - name: Set outputs
      id: set-outputs
      shell: bash
      run: |        
        # Check if all arrays are empty
        plan_summary=$(echo '${{ steps.inspect-plan-result.outputs.result }}' | jq '.')
        if [[ $(echo "$plan_summary" | jq '[.create,.update,.delete,.import,.recreate] | map(length) | add') -eq 0 ]]; then
          exitcode=0
        else
          exitcode=2
        fi
        echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
        echo "plan_summary=$plan_summary" >> $GITHUB_OUTPUT