name: "Bot action to create automated PRs"
description: "Bot action to create automated PRs"
inputs:
  tfc-token:
    description: "HCP token for authentication"
    required: true
  tfc-organization:
    description: "HCP cloud organization"
    required: true
  tfc-workspace:
    description: "HCP cloud workspace name"
    required: true
  keep-plan:
    description: "Whether to keep the plan file after execution (true/false). Default is false."
    required: false
    default: "false"
  skip-targeting:
    description: "Skip target detection and run full plan (e.g., for drift-check). Default is false."
    required: false
    default: "false"
  pr-number:
    description: "Pull request number to get changed files from (uses gh cli). If not provided, uses git diff."
    required: false
    default: ""
  base-ref:
    description: "Base git ref for detecting changes. Default is HEAD~1 for post-merge, origin/main for PRs."
    required: false
    default: ""
  head-ref:
    description: "Head git ref for detecting changes. Default is HEAD."
    required: false
    default: "HEAD"
outputs:
  plan-exitcode:
    description: "Plan detailed exit code (0 - success, empty diff; 1 - error; 2 - success, non-empty diff)"
    value: ${{ steps.inspect-plan-result.outputs.exitcode }}
  plan-summary:
    description: "Summary of the Terraform plan"
    value: ${{ steps.inspect-plan-result.outputs.plan_summary }}
  plan-file:
    description: "Name of the saved Terraform plan file"
    value: ${{ steps.plan.outputs.plan-file }}
runs:
  using: "composite"
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: feature/github-repo-importer/go.sum

    - name: Build target detector CLI
      shell: bash
      working-directory: feature/github-repo-importer
      run: |
        echo "Building importer CLI..."
        go build -o importer .
        chmod +x importer
        echo "CLI built successfully"

    - name: Detect terraform targets
      id: detect-targets
      if: inputs.skip-targeting != 'true'
      shell: bash
      working-directory: feature/github-repo-provisioning/gcss_config
      run: |
        # Determine base-ref based on context
        if [[ -n "${{ inputs.base-ref }}" ]]; then
          BASE_REF="${{ inputs.base-ref }}"
        elif [[ -n "${{ inputs.pr-number }}" ]]; then
          # For PR context, compare against main
          BASE_REF="origin/main"
        else
          # For post-merge, compare against previous commit
          BASE_REF="HEAD~1"
        fi

        echo "Detecting targets..."
        echo "Base ref: ${BASE_REF}"
        echo "Head ref: ${{ inputs.head-ref }}"

        # Build the command
        CMD="../../github-repo-importer/importer detect-targets"
        CMD="$CMD --base-ref=${BASE_REF}"
        CMD="$CMD --head-ref=${{ inputs.head-ref }}"
        CMD="$CMD --repos-dir=repos"
        CMD="$CMD --importer-dir=importer_tmp_dir"
        CMD="$CMD --output-file=terraform-targets.txt"
        CMD="$CMD --verbose"

        # Add PR number if provided
        if [[ -n "${{ inputs.pr-number }}" ]]; then
          CMD="$CMD --pr-number=${{ inputs.pr-number }}"
        fi

        # Run the detection
        $CMD 2>&1

        # Check if targets file exists and has content
        if [[ -f terraform-targets.txt && -s terraform-targets.txt ]]; then
          echo "use-targets=true" >> $GITHUB_OUTPUT
          echo "Targets will be used for terraform plan"
        else
          echo "use-targets=false" >> $GITHUB_OUTPUT
          echo "Full terraform plan will be executed"
        fi

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        cli_config_credentials_token: ${{ inputs.tfc-token }}

    - name: Link backend file
      id: link
      shell: bash
      working-directory: feature/github-repo-provisioning
      env:
        BACKEND: ${{ env.BACKEND }}
      run: |
        if [[ -n "${BACKEND}" ]]; then
          ln -sf "backend.tf.${BACKEND}" backend.tf
        else
          ln -sf backend.tf.hcp backend.tf
        fi

    - name: Terraform fmt
      id: fmt
      shell: bash
      run: terraform fmt -check
      continue-on-error: true

    - name: Run Terraform init
      working-directory: feature/github-repo-provisioning
      id: init
      shell: bash
      run: terraform init -input=false
      env:
        TF_CLOUD_ORGANIZATION: ${{ inputs.tfc-organization }}
        TF_WORKSPACE: ${{ inputs.tfc-workspace }}

    - name: Terraform Validate
      id: validate
      shell: bash
      run: terraform validate -no-color

    - name: Run Terraform plan
      id: plan
      shell: bash
      working-directory: feature/github-repo-provisioning
      env:
        TF_CLOUD_ORGANIZATION: ${{ inputs.tfc-organization }}
        TF_WORKSPACE: ${{ inputs.tfc-workspace }}
      run: |
        # Read targets from file if targeting is enabled
        TARGETS=""
        TARGETS_FILE="gcss_config/terraform-targets.txt"

        if [[ "${{ inputs.skip-targeting }}" == "true" ]]; then
          echo "Targeting disabled - running full plan"
        elif [[ -f "$TARGETS_FILE" && -s "$TARGETS_FILE" ]]; then
          TARGETS=$(cat "$TARGETS_FILE")
          TARGET_COUNT=$(echo "$TARGETS" | wc -w | tr -d ' ')
          echo "Running targeted plan with ${TARGET_COUNT} targets"
          echo "Targets: ${TARGETS}"
        else
          echo "No targets file or empty - running full plan"
        fi

        # Run terraform plan with or without targets
        terraform plan -no-color -input=false -out=tfplan $TARGETS

        if [[ "${{ inputs.keep-plan }}" == "true" ]]; then
          echo "plan-file=$(pwd)/tfplan" >> $GITHUB_OUTPUT
        fi
        terraform show --json tfplan | jq '{
          resource_changes: [(.resource_changes // [])[]],
          data: [(.prior_state.values.root_module.resources // [])[] | select(.mode == "data" and .type == "github_team")]
        }' > tfplan.json

    - name: Inspect plan result
      uses: actions/github-script@v7
      id: inspect-plan-result
      with:
        script: |
          const fs = require('fs');

          const planJson = JSON.parse(fs.readFileSync('feature/github-repo-provisioning/tfplan.json', 'utf8'));          
          const teamMap = Object.fromEntries(
            planJson.data.map(item => [item.values.id, item.values.name])
          );
          const changes = {
              create: [],
              update: [],
              delete: [],
              import: [],
              recreate: []
          };
          
          function getResourceNameFromChange(resourceChange, actualChange){
            if(resourceChange.type === 'github_repository'){
              return `${resourceChange.type} :: ${actualChange.name}`
            }else if(resourceChange.type === 'github_repository_ruleset'){
              return `${resourceChange.type} :: ${actualChange.repository}/${actualChange.name}`
            }else if(resourceChange.type === 'github_repository_collaborator'){
              return `${resourceChange.type} :: ${actualChange.repository}/${actualChange.username}`
            }else if(resourceChange.type === 'github_branch_default'){
              return `${resourceChange.type} :: ${actualChange.repository}/${actualChange.branch}`
            }else if(resourceChange.type === 'github_team_repository'){
              return `${resourceChange.type} :: ${actualChange.repository}/${teamMap[actualChange.team_id]}`          
            }else if(resourceChange.type === 'github_branch_protection'){
              const match = resourceChange.address.match(/module\.repository\["([^"]+)"\]/);
              return `${resourceChange.type} :: ${match[1]}/${actualChange.pattern}`;
            }else if(resourceChange.type === 'github_repository_environment'){
              return `${resourceChange.type} :: ${actualChange.repository}/${actualChange.environment}`;
            } else {
                return `unknown type ${resourceChange.type}. resource address: ${resourceChange.address}`
            }
          }
          
          if (planJson.resource_changes) {
            for (const resourceChange of planJson.resource_changes) {
              const actions = resourceChange.change.actions;
              
              if (actions && actions.length === 1) {
              var action = actions[0];
              
              if (action === 'no-op' && resourceChange.change.importing !== null && resourceChange.change.importing !== undefined) {
                changes.import.push(`${getResourceNameFromChange(resourceChange, resourceChange.change.before)}`);
              }else if(action === 'create'){
                changes.create.push(`${getResourceNameFromChange(resourceChange, resourceChange.change.after)}`);
              }else if(action === 'delete'){
                changes.delete.push(`${getResourceNameFromChange(resourceChange, resourceChange.change.before)}`);
              }else if(action === 'update'){
                changes.update.push(`${getResourceNameFromChange(resourceChange, resourceChange.change.before)}`);
              }
              
              } else if (actions && actions.length > 1) {
                changes.recreate.push(`${getResourceNameFromChange(resourceChange, resourceChange.change.before)}`);
              }
            }
          }
        
          if(changes.create.length === 0 && changes.update.length === 0 && changes.delete.length === 0 && changes.import.length === 0 && changes.recreate.length === 0){
            core.setOutput('exitcode', '0');
          } else {
            core.setOutput('exitcode', '2');
          }
        
          core.setOutput('plan_summary', JSON.stringify(changes));
          return changes;

    - name: Clean up
      shell: bash
      run: |
        rm -f feature/github-repo-provisioning/tfplan.json
        rm -f feature/github-repo-provisioning/gcss_config/terraform-targets.txt
        if [[ "${{ inputs.keep-plan }}" == "false" ]]; then
          rm -f "${{ steps.plan.outputs.plan-file }}"
        fi
