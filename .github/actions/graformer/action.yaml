name: "Bot action to create automated PRs"
description: "Bot action to create automated PRs"
inputs:
  tfc-token:
    description: "HCP token for authentication"
    required: true
  tfc-organization:
    description: "HCP cloud organization"
    required: true
  tfc-workspace:
    description: "HCP cloud workspace name"
    required: true
  gh-token:
    description: "GitHub token for posting PR comments"
    required: true
  pr-number:
    description: "Pull request number to post comments to"
    required: true
outputs:
  plan-exitcode:
    description: "Plan detailed exit code (0 - success, empty diff; 1 - error; 2 - success, non-empty diff)"
    value: ${{ steps.plan.outputs.exitcode }}
  plan-summary:
    description: "Summary of the Terraform plan"
    value: ${{ steps.plan.outputs.plan_summary }}
runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        cli_config_credentials_token: ${{ inputs.tfc-token }}

    - name: Terraform fmt
      id: fmt
      shell: bash
      run: terraform fmt -check
      continue-on-error: true

    - name: Run Terraform init
      working-directory: feature/github-repo-provisioning
      id: init
      shell: bash
      run: terraform init -input=false
      env:
        TF_CLOUD_ORGANIZATION: ${{ inputs.tfc-organization }}
        TF_WORKSPACE: ${{ inputs.tfc-workspace }}

    - name: Terraform Validate
      id: validate
      shell: bash
      run: terraform validate -no-color

    - name: Run Terraform plan
      id: plan
      shell: bash
      working-directory: feature/github-repo-provisioning
      env:
        TF_CLOUD_ORGANIZATION: ${{ inputs.tfc-organization }}
        TF_WORKSPACE: ${{ inputs.tfc-workspace }}
      run: |
        terraform plan -no-color -input=false -detailed-exitcode -out=tfplan
        plan_summary=$(terraform show -no-color -json tfplan \
          | jq -c '
            {
              create:  [.resource_changes[] | select(.change.actions == ["create"]) | .address],
              update:  [.resource_changes[] | select(.change.actions == ["update"]) | .address],
              delete:  [.resource_changes[] 
                | select(.change.actions == ["delete"] 
                  or .change.actions == ["delete","create"] 
                  or .change.actions == ["create","delete"]) 
                | .address],
              import:  [.resource_changes[] | select(.change.importing != null) | "\(.address) (id: \(.change.importing.id))"]
            }
          '
        )
        echo "plan_summary=$plan_summary" >> $GITHUB_OUTPUT

