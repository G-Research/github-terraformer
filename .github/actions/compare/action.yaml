name: "Action: Compare"
description: "Compare two directories and remove identical files"
inputs:
  working-directory:
    description: "Working directory for the action"
    required: true
  source-directory:
    description: "Source directory to compare"
    required: true
  target-directory:
    description: "Target directory to compare"
    required: true
runs:
  using: "composite"
  steps:
    - name: Compare directories and remove identical files
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SOURCE_DIRECTORY: ${{ inputs.source-directory }}
        TARGET_DIRECTORY: ${{ inputs.target-directory }}
      run: |
        set -euo pipefail
        dirA="${SOURCE_DIRECTORY}"
        dirB="${TARGET_DIRECTORY}"
        result=$(just compare "$dirA" "$dirB")
        files_to_delete=$(echo "$result" | jq -r '.identical[]?')
        if [[ -z "$files_to_delete" ]]; then
          echo "No identical (unchanged) files to remove."
        else
          echo "Removing unchanged configs from $dirA so the PR only shows real changes:"
          while IFS= read -r relpath; do
            [[ -z "$relpath" ]] && continue
            rm "$dirA/$relpath"
            echo "Removed: $relpath"
          done <<< "$files_to_delete"
        fi