name: Terraform Plan

on:
  workflow_call:
    inputs:
      commit_sha:
        type: string
        description: 'The commit SHA to promote'
        required: true
      gcss_ref:
        type: string
        description: "GCSS ref to checkout"
        required: false
        default: "main"
    secrets:
      app_private_key:
        required: true
      gh_token:
        required: true
      tfc_token:
        required: true

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    environment: plan
    permissions:
      pull-requests: write
      contents: read
      checks: write
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Create check
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh api repos/${{ github.repository }}/check-runs \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -f name='terraform-plan / terraform-plan' \
            -f head_sha="${{ inputs.commit_sha }}" \
            -f status='in_progress'

      - name: Checkout GCSS
        uses: actions/checkout@v4
        with:
          repository: G-Research/github-terraformer
          ref: ${{ inputs.gcss_ref }}
          persist-credentials: false

      - name: GCSS config setup
        uses: ./.github/actions/gcss-config-setup
        with:
          checkout-sha: ${{ inputs.commit_sha }}
          checkout-token: ${{ secrets.gh_token }}

      - name: Setup terraform and run plan
        uses: ./.github/actions/graformer
        id: graformer
        with:
          tfc-token: ${{ secrets.tfc_token }}
          tfc-organization: "GR-OSS"
          tfc-workspace: ${{ vars.WORKSPACE }}

      - name: Create check
        if: always()
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          if [[ "${{ steps.graformer.outputs.plan-exitcode }}" == 1 ]]; then
            gh api repos/${{ github.repository }}/check-runs \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -f name='terraform-plan / terraform-plan' \
              -f head_sha="${{ inputs.commit_sha }}" \
              -f status='completed' \
              -f conclusion='failure'
          else
            gh api repos/${{ github.repository }}/check-runs \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -f name='terraform-plan / terraform-plan' \
              -f head_sha="${{ inputs.commit_sha }}" \
              -f status='completed' \
              -f conclusion='success'
          fi
