name: Terraform Plan

on:
  workflow_call:
    inputs:
      commit_sha:
        type: string
        description: 'The commit SHA to promote'
        required: true
      gcss_ref:
        type: string
        description: "GCSS ref to checkout"
        required: false
        default: "main"
    secrets:
      app_private_key:
        required: true
      gh_token:
        required: true
      tfc_token:
        required: true

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    environment: plan
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Create in-progress check-run
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh api repos/${{ github.repository }}/check-runs \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -f name='terraform-plan / terraform-plan' \
            -f head_sha="${{ inputs.commit_sha }}" \
            -f status='in_progress'

      - name: Checkout GCSS
        uses: actions/checkout@v4
        with:
          repository: G-Research/github-terraformer
          ref: ${{ inputs.gcss_ref }}
          persist-credentials: false

      - name: GCSS config setup
        uses: ./.github/actions/gcss-config-setup
        with:
          checkout-sha: ${{ inputs.commit_sha }}
          checkout-token: ${{ secrets.gh_token }}

      - name: Setup terraform and run plan
        uses: ./.github/actions/graformer
        id: graformer
        with:
          tfc-token: ${{ secrets.tfc_token }}
          tfc-organization: "GR-OSS"
          tfc-workspace: ${{ vars.WORKSPACE }}
#          gh-token: ${{ steps.generate-token.outputs.token }}
#          pr-number: ${{ github.event.workflow_run.pull_requests[0].number }}

      - name: Post the plan summary as comment on the PR
        if: steps.graformer.outputs.plan-exitcode != '1'
        uses: actions/github-script@v7
        env:
          PLAN_SUMMARY: ${{ steps.graformer.outputs.plan-summary }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const planSummary = JSON.parse(process.env.PLAN_SUMMARY);

            const createCount = planSummary.create?.length || 0;
            const updateCount = planSummary.update?.length || 0;
            const deleteCount = planSummary.delete?.length || 0;
            const importCount = planSummary.import?.length || 0;

            function formatResources(arr) {
              return arr?.length ? arr.join("\n") : "(none)";
            }

            const body = `
            ### Terraform Plan Result
            
            Terraform plan: ${importCount} to import, ${createCount} to add, ${updateCount} to change, ${deleteCount} to destroy.
            
            Resources to delete:
            \`\`\`
            ${formatResources(planSummary.delete)}
            \`\`\`
            
            Resources to create:
            \`\`\`
            ${formatResources(planSummary.create)}
            \`\`\`
            
            Resources to update:
            \`\`\`
            ${formatResources(planSummary.update)}
            \`\`\`
            
            Resources to import:
            \`\`\`
            ${formatResources(planSummary.import)}
            \`\`\`
            `.trim();
              
            // Post comment to PR
            const prNumber = process.env.PR_NUMBER;
            if (prNumber) {
              await github.rest.issues.createComment({
                owner: github.context.repo.owner,
                repo: github.context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
            
            // Set as output for next step
            return body;
        

      - name: Finalize check-run
        if: always()
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          conclusion="failure"
          title="Terraform Plan Failed"
          details_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          summary="The Terraform plan did not complete successfully. Please check workflow logs for details: ${details_url}"
          text="error running terraform plan"

          # Only override if graformer ran and produced an exit code
          if [[ -n "${{ steps.graformer.outcome }}" && "${{ steps.graformer.outcome }}" == "success" ]]; then
            case "${{ steps.graformer.outputs.plan-exitcode }}" in
              0)
                conclusion="success"
                title="Terraform Plan Succeeded (no changes)"
                summary="Terraform executed successfully with **no changes** required. Please check workflow logs for details: ${details_url}"
                text="No infrastructure changes detected"
                ;;
              2)
                conclusion="success"
                title="Terraform Plan Succeeded (with changes)"
                summary="Terraform executed successfully and **changes are required**. Please check workflow logs for details: ${details_url}"
                text="${{ steps.generate-comment.outputs.body }}"
                ;;
              1)
                conclusion="failure"
                title="Terraform Plan Failed"
                summary="Terraform plan failed during execution. Please check workflow logs for details: ${details_url}"
                text="error running terraform plan"
                ;;
            esac
          fi

          gh api repos/${{ github.repository }}/check-runs \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -f name='terraform-plan / terraform-plan' \
            -f head_sha="${{ inputs.commit_sha }}" \
            -f status='completed' \
            -f conclusion="$conclusion" \
            -f details_url="$details_url" \
            -f output[title]="$title" \
            -f output[summary]="$summary" \
            -f output[text]="$text"