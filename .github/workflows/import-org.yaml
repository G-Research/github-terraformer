name: Import organisation pipeline

on:
  workflow_call:
    inputs:
      gcss_ref:
        type: string
        description: "GCSS ref to checkout"
        required: false
        default: "main"
    secrets:
      app_private_key:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  import-org:
    runs-on: ubuntu-latest
    name: Import organisation
    environment: import
    steps:
      - name: Generate a token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Checkout GCSS
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: G-Research/github-terraformer
          ref: ${{ inputs.gcss_ref }}
          persist-credentials: false

      - name: GCSS config setup
        uses: ./.github/actions/gcss-config-setup
        with:
          checkout-sha: ${{ github.sha }}
          checkout-token: ${{ steps.generate-token.outputs.token }}

      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: '1.4.0'

      - name: Setup vars
        id: setup-vars
        run: |
          date_suffix=$(date +%Y%m%d)
          echo "automation_branch_name=import-org/${{ github.repository_owner }}/$date_suffix" >> $GITHUB_OUTPUT

      - name: Import organisation
        working-directory: feature/github-repo-importer
        run: |
          mkdir -p ../github-repo-provisioning/gcss_config/organisation
          just import-org ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Handle configuration files
        uses: ./.github/actions/compare
        with:
          working-directory: feature/github-repo-importer
          source-directory: "../github-repo-provisioning/gcss_config/importer_tmp_dir/organisation/"
          target-directory: "../github-repo-provisioning/gcss_config/organisation/"

      - name: Create Pull Request
        uses: ./.github/actions/pr-bot
        with:
          branch-name: ${{ steps.setup-vars.outputs.automation_branch_name }}
          pr-title: "Import organisation ${{ github.repository_owner }}"
          commit-message: "Auto-generated changes. Import ${{ github.repository_owner }} organisation teams and members"
          github-token: ${{ steps.generate-token.outputs.token }}
